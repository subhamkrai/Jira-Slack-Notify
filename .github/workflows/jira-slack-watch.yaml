name: Jira Slack Notify

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      init_state:
        description: 'Seed state only, no Slack'
        type: boolean
        default: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      JIRA_SLACK_STATE_FILE: scripts/jira-slack-notify/.watch-state.json
    steps:
      - uses: actions/checkout@v6.0.2

      # New key per run (save never overwrites). restore-keys picks the latest cache.
      - uses: actions/cache/restore@v4
        id: cache
        with:
          path: scripts/jira-slack-notify/.watch-state.json
          key: jira-slack-watch-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            jira-slack-watch-${{ github.repository }}-

      - name: watch
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}
          SLACK_NOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFY_WEBHOOK_URL }}
        run: |
          chmod +x scripts/jira-slack-notify/*.sh
          if [[ "${{ inputs.init_state }}" == "true" ]]; then
            ./scripts/jira-slack-notify/watch.sh --init
          else
            ./scripts/jira-slack-notify/watch.sh
          fi

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/jira-slack-notify/.watch-state.json
          key: jira-slack-watch-${{ github.repository }}-${{ github.run_id }}
