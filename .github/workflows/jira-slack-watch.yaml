name: Jira Slack Notify

# Poll Jira and post Slack when a DFBUGS bug is opened or moved to rook/odf-cli.
# Replaces a local cron job; state is persisted via actions/cache between runs.
#
# Required repository secrets:
#   JIRA_EMAIL
#   JIRA_API_TOKEN
#   JIRA_CLOUD_ID
#   SLACK_NOTIFY_WEBHOOK_URL

on:
  schedule:
    # Every 10 minutes (UTC). GitHub may delay or skip runs under load.
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      init_state:
        description: 'Seed watch state only (no Slack notifications)'
        type: boolean
        default: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JIRA_SLACK_STATE_FILE: scripts/jira-slack-notify/.watch-state.json
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: restore watch state
        uses: actions/cache/restore@v4
        with:
          path: scripts/jira-slack-notify/.watch-state.json
          key: jira-slack-watch-state-${{ github.repository }}
          restore-keys: |
            jira-slack-watch-state-

      - name: poll Jira and notify Slack
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}
          SLACK_NOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFY_WEBHOOK_URL }}
        run: |
          chmod +x scripts/jira-slack-notify/watch.sh scripts/jira-slack-notify/notify.sh
          if [[ "${{ inputs.init_state }}" == "true" ]]; then
            ./scripts/jira-slack-notify/watch.sh --init
          else
            ./scripts/jira-slack-notify/watch.sh
          fi

      - name: save watch state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/jira-slack-notify/.watch-state.json
          key: jira-slack-watch-state-${{ github.repository }}
